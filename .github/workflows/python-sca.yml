name: Glog.AI SCA Scan - Python

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  security-events: write
  issues: write

jobs:
  glog-sca:
    runs-on: ubuntu-latest

    env:
      # Large vulnerability database — application + OS advisories
      GLOG_DEPSCAN_VDB_VOLUME: glog-depscan-vdb-full
      VDB_APP_ONLY: "false"
      VDB_HOME: /vdb
      VDB_DATABASE_URL: ghcr.io/appthreat/vdbxz-10y:v6
      VDB_AGE_HOURS: "168"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout glog-action
        uses: actions/checkout@v4
        with:
          repository: glogai/glog-action
          token: ${{ secrets.PAT_TOKEN }}
          path: .github/glog-action
          ref: main

      # Free ~30 GB used by Android SDK, .NET, CodeQL, and large tool caches.
      # Required when using the large VDB (35.5 GB) — without this step the
      # VDB download exhausts available disk space on ubuntu-latest runners.
      - name: Free disk space for large VDB
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare dependency manifest for depscan
        run: |
          if [ -f poetry.lock ]; then
            echo "poetry.lock present — exporting pinned requirements.txt for depscan"
            pip install poetry --quiet
            poetry export --without-hashes --format=requirements.txt -o requirements.txt

          elif [ -f Pipfile.lock ]; then
            echo "Pipfile.lock present — generating pinned requirements.txt via pipenv"
            pip install pipenv --quiet
            pipenv requirements > requirements.txt || true

          elif [ -f pyproject.toml ]; then
            echo "pyproject.toml found — locking and exporting pinned requirements.txt"
            pip install poetry --quiet
            poetry lock --no-update || true
            poetry export --without-hashes --format=requirements.txt -o requirements.txt || true

          elif [ -f setup.py ] || [ -f setup.cfg ]; then
            echo "setup.py/setup.cfg found — installing and freezing pinned requirements.txt"
            pip install --quiet -e . || true
            pip freeze > requirements.txt

          elif [ -f requirements.txt ]; then
            echo "requirements.txt present — installing and freezing pinned versions"
            pip install -r requirements.txt --quiet || true
            pip freeze > requirements.txt

          else
            echo "No Python dependency manifest found — skipping"
            exit 0
          fi

          echo "Packages in requirements.txt: $(wc -l < requirements.txt || echo 'unknown')"

      - name: Disk space before scan                                                                                                                                                     
        run: df -h /  

      - name: Run Glog.AI SCA
        uses: ./.github/glog-action
        with:
          lang: 'oss'
          client: 'test'
          env: 'dev'
          upload: 'true'
          issue: 'true'
          debug: 'true'
          github-token: ${{ secrets.PAT_TOKEN }}
          glog-token: ${{ secrets.GLOG_TOKEN }}

      - name: Show .glog output                                                                                                                                                          
        if: always()                                                                                                                                                                     
        run: |                                                                                                                                                                           
          echo "=== .glog contents ==="                                                                                                                                                  
          ls -lh .glog/ || echo ".glog directory missing"                                                                                                                                
          echo "=== glog-scan.log ==="                                                                                                                                                   
          cat .glog/glog-scan.log || echo "log file missing or empty"                                                                                                                    
          echo "=== glog-scan.sarif (first 50 lines) ==="                                                                                                                                
          head -50 .glog/glog-scan.sarif || echo "sarif file missing or empty"  


