name: Glog.AI Scan

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  security-events: write
  issues: write

jobs:
  glog-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout glog-action repository
        uses: actions/checkout@v6
        with:
          repository: glogai/glog-action
          path: .github/glog-action
          ref: main

      - name: Run Glog.AI
        uses: ./.github/glog-action
        with:
          lang: 'python'
          client: 'test'
          upload: 'true'
          env: 'dev'
          glog-token: ${{ secrets.GLOG_TOKEN }}
          sbom: 'true'
          inventory: 'true'
          on-prem-upload: 'true'
